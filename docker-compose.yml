services:
  opensearch:
    image: opensearchproject/opensearch:3.3.0
    container_name: opensearch-node
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:-SearchLab#2026!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sk -u admin:${OPENSEARCH_PASSWORD:-SearchLab#2026!} https://localhost:9200/_cluster/health | grep -Eq '\"status\":\"(green|yellow)\"'",
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  dashboards:
    image: opensearchproject/opensearch-dashboards:3.3.0
    container_name: opensearch-dashboards
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-SearchLab#2026!}
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    ports:
      - "5601:5601"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs -u admin:${OPENSEARCH_PASSWORD:-SearchLab#2026!} http://localhost:5601/api/status >/dev/null || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opensearch-web
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_NODE: https://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-SearchLab#2026!}
      OPENSEARCH_INDEX_ALIAS: ${OPENSEARCH_INDEX_ALIAS:-capital-projects-current}
      OPENSEARCH_REJECT_UNAUTHORIZED: ${OPENSEARCH_REJECT_UNAUTHORIZED:-false}
      OPENSEARCH_SEARCH_PIPELINE: ${OPENSEARCH_SEARCH_PIPELINE:-capital-projects-hybrid-pipeline}
      OPENSEARCH_INGEST_PIPELINE: ${OPENSEARCH_INGEST_PIPELINE:-capital-projects-normalize}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}
      NYC_CAPITAL_PROJECTS_URL: ${NYC_CAPITAL_PROJECTS_URL:-https://data.cityofnewyork.us/resource/4hcv-tc5r.json}
      NYC_CAPITAL_PROJECTS_PAGE_SIZE: ${NYC_CAPITAL_PROJECTS_PAGE_SIZE:-1000}
      NEXT_PUBLIC_APP_TITLE: ${NEXT_PUBLIC_APP_TITLE:-OpenSearch Research Sandbox}
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    command: sh -lc "CI=1 pnpm install --frozen-lockfile --force && pnpm dev --hostname 0.0.0.0"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules

volumes:
  opensearch-data:
  web-node-modules:
